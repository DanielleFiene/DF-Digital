<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Filter Tuner</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #064f70 100%);
      color: #cbd5e1;
      text-align: center;
      padding: 2rem;
      min-height: 100vh;
      margin: 0;
    }
    
    h1 {
      color: #f8fafc;
      margin-bottom: 1rem;
      font-size: 2.5rem;
    }
    
    p {
      color: #94a3b8;
      margin-bottom: 2rem;
    }
    
    img {
      max-width: 300px;
      display: block;
      margin: 2rem auto;
      transition: all 0.3s ease;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    img:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 48px rgba(56, 189, 248, 0.2);
    }
    
    .sliders {
      max-width: 600px;
      margin: 2rem auto;
      text-align: left;
      background: rgba(30, 41, 59, 0.8);
      padding: 2rem;
      border-radius: 16px;
      border: 1px solid #334155;
      backdrop-filter: blur(10px);
    }
    
    label {
      display: block;
      margin: 1rem 0 0.5rem;
      font-weight: 600;
      color: #f8fafc;
    }
    
    input[type="range"] {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: #334155;
      outline: none;
      -webkit-appearance: none;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #38bdf8;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #38bdf8;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
    }
    
    .value-display {
      display: inline-block;
      margin-left: 1rem;
      color: #38bdf8;
      font-weight: 600;
      min-width: 40px;
    }
    
    code {
      display: block;
      margin-top: 2rem;
      background: rgba(15, 23, 42, 0.8);
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #334155;
      color: #7dd3fc;
      font-family: 'Courier New', monospace;
      text-align: left;
      overflow-x: auto;
    }
    
    .reset-btn {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.3s ease;
    }
    
    .reset-btn:hover {
      background: #0ea5e9;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(56, 189, 248, 0.3);
    }
  </style>
</head>
<body>
  <h1>🎨 CSS Filter Tuner</h1>
  <p>Pas de sliders aan en kijk hoe je logo verandert.</p>
  <img id="logo" src="/resources/images/red rocket.webp" alt="Logo">

  <div class="sliders">
    <label>Invert (%) <span class="value-display" id="invert-value">100</span></label>
    <input type="range" id="invert" min="0" max="100" value="100">
    
    <label>Hue Rotate (°) <span class="value-display" id="hue-value">175</span></label>
    <input type="range" id="hue" min="0" max="360" value="175">
    
    <label>Saturate (%) <span class="value-display" id="saturate-value">400</span></label>
    <input type="range" id="saturate" min="0" max="600" value="400">
    
    <label>Contrast (%) <span class="value-display" id="contrast-value">130</span></label>
    <input type="range" id="contrast" min="50" max="200" value="130">
    
    <label>Brightness (%) <span class="value-display" id="brightness-value">100</span></label>
    <input type="range" id="brightness" min="50" max="150" value="100">
    
    <button class="reset-btn" onclick="resetFilters()">Reset to Default</button>
  </div>

  <code id="cssOutput"></code>

  <script>
    const logo = document.getElementById("logo");
    const output = document.getElementById("cssOutput");
    const sliders = document.querySelectorAll("input[type=range]");

    function updateFilter() {
      const invert = document.getElementById("invert").value;
      const hue = document.getElementById("hue").value;
      const saturate = document.getElementById("saturate").value;
      const contrast = document.getElementById("contrast").value;
      const brightness = document.getElementById("brightness").value;

      const filter = `invert(${invert}%) hue-rotate(${hue}deg) saturate(${saturate}%) contrast(${contrast}%) brightness(${brightness}%)`;
      logo.style.filter = filter;
      output.textContent = `filter: ${filter};`;
    }

    sliders.forEach(slider => slider.addEventListener("input", updateFilter));
    updateFilter(); // init
  </script>
</body>
</html>
